<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Afrillia!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* === GLOBAL STYLES === */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; /* Mencegah scroll karena ini transisi antar layar (SPA) */
            font-family: 'Poppins', sans-serif;
            background-color: #000;
        }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; pointer-events: none;
            transition: opacity 1s ease-in-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scene.active {
            opacity: 1; pointer-events: auto;
            z-index: 10;
        }

        /* === SCENE 1 STYLES === */
        #scene1 { background-color: #000; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .s1-content { z-index: 20; text-align: center; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        
        .btn-outline {
            background: transparent; border: 2px solid #ff4d6d; color: #ff4d6d;
            padding: 10px 24px; border-radius: 50px; font-weight: 600;
            transition: all 0.3s ease; cursor: pointer; pointer-events: auto;
        }
        .btn-outline:hover { background: #ff4d6d; color: #fff; box-shadow: 0 0 15px #ff4d6d; }
        
        .btn-float-right {
            position: absolute; bottom: 30px; right: 30px; z-index: 30;
            background: rgba(255, 77, 109, 0.2); border: 1px solid #ff4d6d;
            color: #ffb3c1; padding: 8px 16px; border-radius: 8px; font-size: 0.8rem;
            cursor: pointer; transition: 0.3s; pointer-events: auto;
        }
        .btn-float-right:hover { background: #ff4d6d; color: white; }

        /* === SCENE 2 STYLES (CAKE) === */
        #scene2 { background: linear-gradient(135deg, #ffe5ec, #ffc2d1); }
        
        .cake-container {
            position: relative; width: 200px; height: 200px; margin: 40px auto; z-index: 20;
        }
        .tier {
            position: absolute; left: 50%; transform: translateX(-50%);
            background: #ff7eb3; border-radius: 10px 10px 0 0;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1);
        }
        .tier-1 { bottom: 0; width: 180px; height: 60px; background: #ff4d6d; }
        .tier-2 { bottom: 60px; width: 130px; height: 50px; background: #ff758f; }
        .tier-3 { bottom: 110px; width: 80px; height: 40px; background: #ff8fa3; }
        
        .candle {
            position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 35px; background: #fff; border-radius: 3px;
        }
        .flame {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 15px; height: 20px; background: #ffb703;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ffb703;
            animation: flicker 0.5s infinite alternate;
        }
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        .btn-solid {
            background: #ff4d6d; color: white; padding: 12px 28px;
            border-radius: 50px; font-weight: bold; border: none;
            cursor: pointer; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s; z-index: 20; pointer-events: auto;
        }
        .btn-solid:hover { transform: scale(1.05); }

        /* === SCENE 3 STYLES (CARD) === */
        #scene3 {
            background: linear-gradient(to bottom, #1e3a8a, #3b82f6);
            perspective: 1000px;
        }
        
        .decorations {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
        }

        .envelope-wrapper {
            position: relative; width: 320px; height: 220px;
            margin-top: 50px; z-index: 20; cursor: pointer; pointer-events: auto;
        }
        .envelope {
            position: absolute; inset: 0; background: #e2e8f0;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .envelope-front {
            position: absolute; inset: 0; border-radius: 0 0 10px 10px;
            border-left: 160px solid #cbd5e1;
            border-right: 160px solid #cbd5e1;
            border-bottom: 110px solid #94a3b8;
            border-top: 110px solid transparent;
            z-index: 3; pointer-events: none;
        }
        .envelope-flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #f1f5f9;
            z-index: 4; transform-origin: top;
            transition: transform 0.8s ease-in-out, z-index 0.2s;
        }
        .card {
            position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: white; border-radius: 8px; z-index: 2;
            padding: 20px; text-align: center; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: transform 0.8s ease-in-out;
        }
        
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg); z-index: 1;
        }
        .envelope-wrapper.open .card {
            transform: translateY(-120px); z-index: 5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- SCENE 1: Malam & Kembang Api -->
    <div id="scene1" class="scene active">
        <canvas id="fireworksCanvas"></canvas>
        <canvas id="heartsCanvas"></canvas>
        
        <div class="s1-content space-y-6">
            <h1 class="text-white font-cursive text-5xl md:text-7xl font-bold tracking-wider drop-shadow-[0_0_15px_rgba(255,255,255,0.8)] opacity-0 transform translate-y-4 transition-all duration-1000" id="text1">
                Happy Birthday,
            </h1>
            <h1 class="text-white font-cursive text-5xl md:text-7xl font-bold tracking-wider drop-shadow-[0_0_15px_rgba(255,255,255,0.8)] opacity-0 transform translate-y-4 transition-all duration-1000" id="text2">
                Afrillia
            </h1>
            
            <div class="mt-12 opacity-0 transition-opacity duration-1000" id="btn-container1">
                <button class="btn-outline" onclick="goToScene(2)">Celebrate Our Love</button>
            </div>
        </div>

        <button class="btn-float-right opacity-0 transition-opacity duration-1000" id="btn-cutting" onclick="goToScene(2)">
            Cake cutting
        </button>
    </div>

    <!-- SCENE 2: Potong Kue -->
    <div id="scene2" class="scene">
        <canvas id="confettiCanvas"></canvas>
        
        <div class="z-10 text-center space-y-4 flex flex-col items-center">
            <h2 class="text-3xl md:text-5xl font-bold text-pink-600 drop-shadow-md tracking-wide">
                Let's Cut the Cake! 🎂
            </h2>
            
            <div class="cake-container">
                <div class="candle"><div class="flame"></div></div>
                <div class="tier tier-3"></div>
                <div class="tier tier-2"></div>
                <div class="tier tier-1"></div>
            </div>

            <button class="btn-solid mt-8" onclick="goToScene(3)">Next Page ➔</button>
        </div>
    </div>

    <!-- SCENE 3: Kartu Ucapan -->
    <div id="scene3" class="scene overflow-hidden relative">
        <div class="decorations">
            <!-- Bendera Hiasan -->
            <svg width="100%" height="150" preserveAspectRatio="none" viewBox="0 0 1000 150">
                <path d="M0,0 L50,80 L100,0 L150,80 L200,0 L250,80 L300,0 L350,80 L400,0 L450,80 L500,0 L550,80 L600,0 L650,80 L700,0 L750,80 L800,0 L850,80 L900,0 L950,80 L1000,0" fill="none" stroke="#fff" stroke-width="2"/>
                <polygon points="0,0 50,80 100,0" fill="#ff4d6d" opacity="0.8"/>
                <polygon points="100,0 150,80 200,0" fill="#4ea8de" opacity="0.8"/>
                <polygon points="200,0 250,80 300,0" fill="#ffd166" opacity="0.8"/>
                <polygon points="300,0 350,80 400,0" fill="#06d6a0" opacity="0.8"/>
                <polygon points="400,0 450,80 500,0" fill="#ff4d6d" opacity="0.8"/>
                <polygon points="500,0 550,80 600,0" fill="#4ea8de" opacity="0.8"/>
                <polygon points="600,0 650,80 700,0" fill="#ffd166" opacity="0.8"/>
                <polygon points="700,0 750,80 800,0" fill="#06d6a0" opacity="0.8"/>
                <polygon points="800,0 850,80 900,0" fill="#ff4d6d" opacity="0.8"/>
                <polygon points="900,0 950,80 1000,0" fill="#4ea8de" opacity="0.8"/>
            </svg>
            
            <!-- Balon -->
            <svg class="absolute top-20 left-10 md:left-20 w-24 h-40" viewBox="0 0 50 100">
                <ellipse cx="25" cy="30" rx="20" ry="25" fill="#4ea8de" opacity="0.9"/>
                <polygon points="25,55 20,65 30,65" fill="#4ea8de"/>
                <path d="M25,65 Q10,80 25,100" fill="none" stroke="#fff" stroke-width="1"/>
            </svg>
            <svg class="absolute top-10 right-10 md:right-20 w-32 h-48" viewBox="0 0 50 100">
                <ellipse cx="25" cy="30" rx="20" ry="25" fill="#ffd166" opacity="0.9"/>
                <polygon points="25,55 20,65 30,65" fill="#ffd166"/>
                <path d="M25,65 Q40,80 25,100" fill="none" stroke="#fff" stroke-width="1"/>
            </svg>
        </div>

        <div class="z-10 text-center mb-6 mt-10">
            <h2 class="text-2xl md:text-3xl text-white font-bold tracking-wide drop-shadow-md">Klik amplopnya!</h2>
        </div>

        <!-- Amplop Interaktif -->
        <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
            <div class="envelope"></div>
            <div class="envelope-flap"></div>
            <div class="envelope-front"></div>
            
            <div class="card">
                <div class="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center mb-2">
                    <span class="text-2xl">🎂</span>
                </div>
                <h3 class="font-bold text-xl text-gray-800 border-b border-gray-200 pb-2 mb-2 w-full">
                    Happy<br>BIRTHDAY<br>TO YOU!
                </h3>
                <p class="text-xs text-gray-500 font-medium">Dear Afrillia,</p>
                <p class="text-[10px] text-gray-400 mt-1 px-4 leading-tight">
                    May all your wishes come true.<br>Filled with love, joy, and happiness.<br>Always keep smiling!
                </p>
            </div>
        </div>
    </div>

    <!-- === JAVASCRIPT LOGIC === -->
    <script>
        // Memastikan seluruh elemen termuat sebelum menjalankan skrip
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- Logika Navigasi Antar Scene ---
            window.goToScene = function(sceneNumber) {
                document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
                const nextScene = document.getElementById('scene' + sceneNumber);
                if (nextScene) nextScene.classList.add('active');
                
                // Nyalakan confetti jika masuk ke scene 2
                if(sceneNumber === 2) startConfetti();
                // Matikan animasi kembang api agar lebih ringan jika pindah scene
                if(sceneNumber !== 1) scene1Active = false; 
            };

            // --- Animasi Masuk Scene 1 ---
            setTimeout(() => {
                const t1 = document.getElementById('text1');
                if(t1) t1.classList.remove('opacity-0', 'translate-y-4');
            }, 500);
            setTimeout(() => {
                const t2 = document.getElementById('text2');
                if(t2) t2.classList.remove('opacity-0', 'translate-y-4');
            }, 1500);
            setTimeout(() => {
                const b1 = document.getElementById('btn-container1');
                if(b1) b1.classList.remove('opacity-0');
            }, 2500);
            setTimeout(() => {
                const b2 = document.getElementById('btn-cutting');
                if(b2) b2.classList.remove('opacity-0');
            }, 3000);

            // --- Sistem Partikel Canvas ---
            const fwCanvas = document.getElementById('fireworksCanvas');
            const hrCanvas = document.getElementById('heartsCanvas');
            const cfCanvas = document.getElementById('confettiCanvas');
            
            // Pengaman: Jangan jalankan jika elemen canvas tidak ditemukan
            if (!fwCanvas || !hrCanvas || !cfCanvas) return;

            const fwCtx = fwCanvas.getContext('2d');
            const hrCtx = hrCanvas.getContext('2d');
            const cfCtx = cfCanvas.getContext('2d');

            function resizeCanvas() {
                fwCanvas.width = hrCanvas.width = cfCanvas.width = window.innerWidth;
                fwCanvas.height = hrCanvas.height = cfCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            let scene1Active = true;
            const colors = ['#ff4d6d', '#06d6a0', '#ffb3c1', '#ffd166'];

            // 1. Kembang Api (Fireworks)
            class Particle {
                constructor(x, y, color) {
                    this.x = x; this.y = y; this.color = color;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 1;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
                }
                update() {
                    this.vx *= 0.95; this.vy *= 0.95; // Gesekan udara
                    this.vy += 0.05; // Gravitasi
                    this.x += this.vx; this.y += this.vy;
                    this.alpha -= this.decay;
                }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.alpha;
                    ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2);
                    ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
                }
            }
            
            let fireworks = [];
            function createFirework() {
                const x = Math.random() * fwCanvas.width;
                const y = Math.random() * (fwCanvas.height * 0.5);
                const color = colors[Math.floor(Math.random() * colors.length)];
                for(let i=0; i<60; i++) fireworks.push(new Particle(x, y, color));
            }

            // 2. Hati (Hearts)
            class Heart {
                constructor() {
                    this.x = Math.random() * hrCanvas.width;
                    this.y = hrCanvas.height + Math.random() * 100;
                    this.size = Math.random() * 15 + 5;
                    this.speed = Math.random() * 2 + 1;
                    this.opacity = Math.random() * 0.5 + 0.3;
                }
                update() {
                    this.y -= this.speed;
                    if(this.y < -50) {
                        this.y = hrCanvas.height + 50;
                        this.x = Math.random() * hrCanvas.width;
                    }
                }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = '#ff4d6d';
                    ctx.beginPath();
                    let topCurveHeight = this.size * 0.3;
                    ctx.moveTo(this.x, this.y + topCurveHeight);
                    ctx.bezierCurveTo(this.x, this.y, this.x - this.size / 2, this.y, this.x - this.size / 2, this.y + topCurveHeight);
                    ctx.bezierCurveTo(this.x - this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + this.size);
                    ctx.bezierCurveTo(this.x, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + topCurveHeight);
                    ctx.bezierCurveTo(this.x + this.size / 2, this.y, this.x, this.y, this.x, this.y + topCurveHeight);
                    ctx.fill(); ctx.restore();
                }
            }
            let hearts = Array.from({length: 40}, () => new Heart());

            // Loop Animasi Scene 1
            function initFireworksAndHearts() {
                if (!scene1Active) return; // Hentikan memori bocor
                
                if(Math.random() < 0.03) createFirework();
                
                fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
                for(let i = fireworks.length - 1; i >= 0; i--) {
                    fireworks[i].update(); fireworks[i].draw(fwCtx);
                    if(fireworks[i].alpha <= 0) fireworks.splice(i, 1);
                }

                hrCtx.clearRect(0, 0, hrCanvas.width, hrCanvas.height);
                hearts.forEach(h => { h.update(); h.draw(hrCtx); });

                requestAnimationFrame(initFireworksAndHearts);
            }
            initFireworksAndHearts(); // Mulai saat dimuat

            // 3. Confetti (Scene 2)
            class Confetti {
                constructor() {
                    this.x = Math.random() * cfCanvas.width;
                    this.y = Math.random() * -cfCanvas.height;
                    this.w = Math.random() * 10 + 5;
                    this.h = Math.random() * 15 + 5;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.speedY = Math.random() * 3 + 2;
                    this.speedX = Math.random() * 2 - 1;
                    this.rotation = Math.random() * 360;
                    this.rotSpeed = Math.random() * 5 - 2.5;
                }
                update() {
                    this.y += this.speedY; this.x += this.speedX;
                    this.rotation += this.rotSpeed;
                    if (this.y > cfCanvas.height) {
                        this.y = -20; this.x = Math.random() * cfCanvas.width;
                    }
                }
                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y); ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.fillStyle = this.color; ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                    ctx.restore();
                }
            }
            
            let confettis = Array.from({length: 100}, () => new Confetti());
            let confettiRunning = false;
            
            function startConfetti() {
                if(confettiRunning) return;
                confettiRunning = true;
                function animateConfetti() {
                    cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
                    confettis.forEach(c => { c.update(); c.draw(cfCtx); });
                    if(document.getElementById('scene2').classList.contains('active')) {
                        requestAnimationFrame(animateConfetti);
                    } else {
                        confettiRunning = false;
                    }
                }
                animateConfetti();
            }
        });
    </script>
</body>
</html>
